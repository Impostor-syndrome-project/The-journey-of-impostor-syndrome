<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motion Impostor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000; width: 100vw; height: 100vh;
      overflow: hidden;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    }
    #video-container { position: fixed; inset: 0; z-index: 1; }
    #video-container iframe { width: 100%; height: 100%; border: none; }
    #overlay {
      position: fixed; inset: 0; display: flex;
      justify-content: center; align-items: center; z-index: 10; cursor: pointer;
    }
    #playBtn {
      background: transparent; border: 2px solid #fff; color: #fff;
      font-size: 1.2rem; padding: 16px 40px; border-radius: 50px;
      letter-spacing: 2px; pointer-events: none; font-family: sans-serif;
    }
    .top-btn {
      position: fixed; top: 20px; z-index: 20; display: none;
      background: transparent; border: 2px solid #fff; color: #fff;
      font-size: 0.75rem; padding: 8px 18px; border-radius: 50px;
      letter-spacing: 1.5px; cursor: pointer; font-family: sans-serif;
      -webkit-touch-callout: none;
    }
    #soundBtn { right: 20px; }
    #subBtn   { right: 148px; }
    #openReadBtn {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: none;
      background: transparent; border: 2px solid #fff; color: #fff;
      font-size: 0.85rem; padding: 10px 28px; border-radius: 50px;
      letter-spacing: 2px; cursor: pointer; font-family: sans-serif;
      -webkit-touch-callout: none;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #subtitle {
      position: fixed; bottom: 28px;
      left: 50%; transform: translateX(-50%);
      width: max-content; max-width: 88vw;
      z-index: 15; pointer-events: none;
      color: #fff; font-family: sans-serif; font-size: 0.88rem;
      text-align: center; line-height: 1.75;
      display: none;
    }
    .sub-line {
      display: inline;
      background: rgba(10,10,10,0.45);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
      padding: 0.1em 0.45em 0.15em;
      border-radius: 3px;
      white-space: pre-wrap;
    }
    #click-layer { position: fixed; inset: 0; z-index: 5; display: none; -webkit-touch-callout: none; }
    #pauseIndicator {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #fff; font-family: sans-serif; font-size: 1rem;
      letter-spacing: 2px; opacity: 0; z-index: 15;
      pointer-events: none; transition: opacity 0.3s;
    }
    #guide {
      position: fixed; inset: 0; background: rgba(70,70,70,0.58);
      z-index: 30; display: none; cursor: pointer; -webkit-touch-callout: none;
    }
    .g-label {
      position: absolute; color: #fff; font-family: sans-serif;
      font-size: 0.78rem; letter-spacing: 1px; line-height: 1.8; pointer-events: none;
    }
    #guide-dismiss {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-family: sans-serif;
      font-size: 0.7rem; letter-spacing: 1px; white-space: nowrap; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="video-container">
  <iframe id="vimeoFrame"
    src="https://player.vimeo.com/video/1192237212?badge=0&autopause=0&player_id=0&app_id=58479&controls=0&autoplay=0&muted=1"
    allow="autoplay; fullscreen; picture-in-picture" allowfullscreen>
  </iframe>
</div>

<div id="overlay"><button id="playBtn">PLAY</button></div>
<button id="soundBtn" class="top-btn">SOUND ON</button>
<button id="subBtn"   class="top-btn">SUB ENG</button>
<div id="subtitle"></div>
<button id="openReadBtn">เปิดอ่าน</button>
<div id="click-layer"></div>
<div id="pauseIndicator">PAUSED</div>

<div id="guide">
  <svg style="position:absolute;top:54px;right:22px;width:22px;height:36px;" viewBox="0 0 22 36" pointer-events="none">
    <line x1="11" y1="32" x2="11" y2="4" stroke="white" stroke-width="2"/>
    <polyline points="4,12 11,2 18,12" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  </svg>
  <div class="g-label" style="top:94px;right:8px;text-align:right;">เปิด / ปิด เสียง</div>

  <svg style="position:absolute;top:54px;right:150px;width:22px;height:36px;" viewBox="0 0 22 36" pointer-events="none">
    <line x1="11" y1="32" x2="11" y2="4" stroke="white" stroke-width="2"/>
    <polyline points="4,12 11,2 18,12" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  </svg>
  <div class="g-label" style="top:94px;right:118px;text-align:right;">ซับไตเติ้ลภาษาอังกฤษ</div>

  <svg style="position:absolute;top:calc(50% - 100px);left:calc(50% - 11px);width:22px;height:36px;" viewBox="0 0 22 36" pointer-events="none">
    <line x1="11" y1="32" x2="11" y2="4" stroke="white" stroke-width="2"/>
    <polyline points="4,12 11,2 18,12" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  </svg>
  <div class="g-label" style="top:calc(50% - 56px);left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap;">
    แตะหน้าจอ 1 ครั้ง<br>หยุด / เล่นต่อ
  </div>

  <div class="g-label" style="top:50%;right:8px;transform:translateY(20px);text-align:right;">
    กดค้างด้านขวา<br>เพื่อเร่ง 2×
  </div>
  <svg style="position:absolute;top:50%;right:106px;transform:translateY(28px);width:36px;height:20px;" viewBox="0 0 36 20" pointer-events="none">
    <line x1="2" y1="10" x2="30" y2="10" stroke="white" stroke-width="2"/>
    <polyline points="22,3 32,10 22,17" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  </svg>

  <div class="g-label" style="top:50%;left:8px;transform:translateY(20px);text-align:left;">
    กดค้างด้านซ้าย<br>เพื่อกรอย้อนหลัง
  </div>
  <svg style="position:absolute;top:50%;left:120px;transform:translateY(28px);width:36px;height:20px;" viewBox="0 0 36 20" pointer-events="none">
    <line x1="34" y1="10" x2="6" y2="10" stroke="white" stroke-width="2"/>
    <polyline points="14,3 4,10 14,17" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  </svg>

  <div id="guide-dismiss">แตะที่ไหนก็ได้เพื่อปิดและเริ่มเล่น</div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
const subs = [
  { s:0,   e:8,   t:"Does it ever wear you out...\nhaving to be 'the capable one' all the time?" },
  { s:8,   e:13,  t:"After a long day, you finally sit down to rest." },
  { s:13,  e:17,  t:"Every single day, you push yourself to prove your worth —" },
  { s:17,  e:21,  t:"until the exhaustion catches up, and you drift off to sleep." },
  { s:23,  e:28,  t:"And then you slip into another dimension —\none that feels strangely unfamiliar." },
  { s:32,  e:36,  t:"You find yourself in a vast forest,\nfull of hardworking ants you can somehow speak to." },
  { s:36,  e:38,  t:"So you ask —" },
  { s:38,  e:41,  t:"\"Where are you all heading?\"" },
  { s:41,  e:46,  t:"\"We've been out foraging." },
  { s:46,  e:50,  t:"A flood hit days ago and we can't find our way back to the nest." },
  { s:50,  e:52,  t:"Could you help us get home?\"" },
  { s:52,  e:54,  t:"\"Of course.\"" },
  { s:54,  e:58,  t:"You follow them quietly past a clear, still stream." },
  { s:58,  e:61,  t:"You stop to look at your own reflection." },
  { s:61,  e:64,  t:"And then... something slowly surfaces." },
  { s:64,  e:67,  t:"In truth, this is the Stream of Thoughts." },
  { s:67,  e:70,  t:"Whatever you think, it appears here." },
  { s:70,  e:73,  t:"\"Someone else would have done this so much better.\"" },
  { s:73,  e:76,  t:"\"Honestly, I'm not that talented.\"" },
  { s:76,  e:79,  t:"\"If they knew the truth... they'd be so disappointed.\"" },
  { s:79,  e:82,  t:"\"I only got here because of luck.\"" },
  { s:82,  e:86,  t:"\"I just haven't tried hard enough.\"" },
  { s:86,  e:90,  t:"Having these thoughts — you are not alone." },
  { s:90,  e:96,  t:"70% of people have felt they weren't truly capable," },
  { s:96,  e:99,  t:"or that they didn't deserve the success they'd earned." },
  { s:99,  e:105, t:"Even highly successful people face this —\nthey too live with Impostor Syndrome." },
  { s:105, e:108, t:"\"This feeling can be overcome\nonce we understand its roots.\"" },
  { s:100, e:104, t:"You walk on until you reach a rocky clearing in the forest." },
  { s:104, e:106, t:"Light filters through onto a stone —" },
  { s:106, e:111, t:"revealing a massive ant colony. You've made it to the nest." },
  { s:112, e:117, t:"But you never really got to know\nthe ants who walked with you." },
  { s:117, e:122, t:"Why not take a closer look?" },
  { s:122, e:126, t:"You might find something in them\nthat feels familiar." },
  // The Expert: จบที่ 2:12 = 132s
  { s:126, e:130, t:"The Expert." },
  { s:130, e:136, t:"Needs to know everything before acting —\nafraid of being seen as incompetent." },
  { s:136, e:132, t:"" },
  { s:128, e:132, t:"Deeply anxious whenever they can't answer something." },
  // The Superhuman: 2:14-2:21 = 134-141s
  { s:134, e:137, t:"The Superhuman." },
  { s:137, e:141, t:"Tries to excel at every role, all at once —\nand forgets their own limits." },
  { s:141, e:134, t:"" },
  // The Soloist: 2:23-2:35 = 143-155s
  { s:143, e:146, t:"The Soloist." },
  { s:146, e:150, t:"Believes that asking for help is a sign of weakness." },
  { s:150, e:155, t:"So they carry everything alone —\neven when it's far too much." },
  // The Natural Genius: 2:37-2:47 = 157-167s
  { s:157, e:160, t:"The Natural Genius." },
  { s:160, e:164, t:"Expects to get things right on the very first try,\nno practice needed." },
  { s:164, e:167, t:"If it takes effort — or goes wrong —\nthey feel they're not truly gifted." },
  // The Perfectionist: 2:49-2:55 = 169-175s
  { s:169, e:172, t:"The Perfectionist." },
  { s:172, e:175, t:"Sets impossibly high standards. No mistakes allowed." },
  { s:175, e:169, t:"" },
  // 2:56-3:03 = 176-183s
  { s:176, e:183, t:"Each of these five mindsets has a name and an origin.\nCurious what they are?" },
  // Impostor Syndrome: ขยับมาต่อก่อนหน้า ลด 2 วิ = 183s
  { s:183, e:187, t:"Impostor Syndrome is not a disorder." },
  { s:187, e:189, t:"It's a pattern of thinking that can affect absolutely anyone —" },
  // students: 2 วิพอ ต่อกันเลย
  { s:189, e:191, t:"students, working adults,\nand even highly successful people." },
  // Having these thoughts: ต่อกันเลยไม่มี dead air
  { s:191, e:195, t:"Having these thoughts is nobody's fault." },
  { s:195, e:199, t:"It often comes from a combination of things:" },
  { s:199, e:202, t:"high expectations placed on you," },
  { s:202, e:205, t:"comparing yourself to others," },
  { s:205, e:208, t:"a culture that prizes achievement above all else," },
  { s:208, e:212, t:"and a social media feed full of everyone else's highlights." },
  // ลด 1 วิทุกท่อนหลังจากนี้จนจบ
  { s:212, e:216, t:"Impostor Syndrome is nothing to be afraid of." },
  { s:216, e:220, t:"You just have to understand it — and make peace with it." },
  { s:220, e:224, t:"You don't have to be perfect all the time." },
  { s:224, e:229, t:"You just have to be you — a you that is still growing." },
  { s:230, e:235, t:"You follow the path all the way to its end." },
  { s:235, e:240, t:"Before you part ways, one of the ants hands you something." },
  { s:240, e:244, t:"Go ahead — open it..." },
  { s:244, e:249, t:"Every mistake you've made." },
  { s:249, e:254, t:"Every moment of self-doubt." },
  { s:254, e:260, t:"All of it has shaped you into who you are today —" },
  { s:260, e:266, t:"and that version of you is the strongest one yet." },
  // เครดิต hotline
  { s:258, e:268, t:"If you'd like to talk to someone:\nMental Health Hotline: 1323\nSWU SMILE: 02 258 9105 · LINE @swusmile\n(for SWU students)" },
  // เครดิต project + Valerie Young ครบ ให้เวลาแสดงนานพอ
  { s:268, e:295, t:"Senior Project — Communication Innovation\nKalta Setwora & Issada-on Muktad\nHealth Communication, COSCI, SWU\n\nAdvisor: Asst. Prof. Apirapee Settharuk Tancharoenwong\nCommittee: Asst. Prof. Dr. Srirath Pakdeeronachit\nAsst. Prof. Dr. Chanonya Chaiwongroj · Dr. Supkanate Chunhasiriruk" },
  { s:268, e:295, t:"Inspired by: Dr. Valerie Young's 5 Competence Types\nThe Secret Thoughts of Successful Women (Crown Business, 2011, 2023)\n\nReference: Young, V. (2011/2023). The secret thoughts of successful women: And men, why capable people suffer from impostor syndrome and how to thrive in spite of it. Crown Business.\n\nFurther reading: impostorsyndrome.com" },
];

const overlayEl   = document.getElementById('overlay');
const clickLayer  = document.getElementById('click-layer');
const soundBtn    = document.getElementById('soundBtn');
const subBtn      = document.getElementById('subBtn');
const subtitleEl  = document.getElementById('subtitle');
const openReadBtn = document.getElementById('openReadBtn');
const iframe      = document.getElementById('vimeoFrame');
const guide       = document.getElementById('guide');
const pauseInd    = document.getElementById('pauseIndicator');

let player, isMuted = false, isPaused = false;
let subOn = false;
let isHolding = false, holdTimer = null, rewindInterval = null;
let currentTime = 0, openReadShown = false, openReadDismissed = false;
let lastSubText = '';

function updateSubtitle(t) {
  if (!subOn) { if (subtitleEl.innerHTML !== '') subtitleEl.innerHTML = ''; return; }
  const matches = subs.filter(s => t >= s.s && t < s.e);
  const found   = matches.length ? matches[matches.length - 1] : null;
  const newText = found ? found.t : '';
  if (newText !== lastSubText) {
    lastSubText = newText;
    if (!newText) { subtitleEl.innerHTML = ''; }
    else {
      const lines = newText.split('\n');
      subtitleEl.innerHTML = lines.map(l => '<span class="sub-line">' + l + '</span>').join('<br>');
    }
  }
}

overlayEl.addEventListener('click', function () {
  overlayEl.style.display = 'none';
  soundBtn.style.display  = 'block';
  subBtn.style.display    = 'block';
  subtitleEl.style.display = 'block';
  player = new Vimeo.Player(iframe);
  player.setMuted(false);
  player.setVolume(1);
  guide.style.display = 'block';
});

guide.addEventListener('click', function () {
  guide.style.display   = 'none';
  clickLayer.style.display = 'block';
  player.play();
  player.on('timeupdate', function (data) {
    currentTime = data.seconds;
    updateSubtitle(currentTime);
    if (currentTime >= 235 && currentTime < 251 && !openReadShown && !openReadDismissed) {
      openReadShown = true; openReadBtn.style.display = 'block';
    } else if ((currentTime < 235 || currentTime >= 251) && openReadShown) {
      openReadShown = false; openReadBtn.style.display = 'none';
    }
  });
});

soundBtn.addEventListener('click', function (e) {
  e.stopPropagation();
  if (!player) return;
  isMuted = !isMuted;
  player.setMuted(isMuted);
  if (!isMuted) player.setVolume(1);
  soundBtn.textContent = isMuted ? 'SOUND OFF' : 'SOUND ON';
});

subBtn.addEventListener('click', function (e) {
  e.stopPropagation();
  subOn = !subOn;
  subBtn.textContent = subOn ? 'SUB ON' : 'SUB ENG';
  if (!subOn) { subtitleEl.innerHTML = ''; lastSubText = ''; }
});

openReadBtn.addEventListener('click', function (e) {
  e.stopPropagation();
  openReadBtn.style.display = 'none';
  openReadDismissed = true;
  if (player) player.setCurrentTime(251);
});

clickLayer.addEventListener('pointerdown', function (e) {
  e.preventDefault();
  const isRight = e.clientX > window.innerWidth * 0.6;
  const isLeft  = e.clientX < window.innerWidth * 0.4;
  if (isRight) {
    holdTimer = setTimeout(() => { isHolding = true; if (player) player.setPlaybackRate(2); }, 200);
  } else if (isLeft) {
    holdTimer = setTimeout(() => {
      isHolding = true;
      if (!player) return;
      rewindInterval = setInterval(() => { currentTime = Math.max(0, currentTime - 0.25); player.setCurrentTime(currentTime); }, 100);
    }, 200);
  }
});

function stopHold() {
  clearTimeout(holdTimer);
  if (rewindInterval) { clearInterval(rewindInterval); rewindInterval = null; }
  if (isHolding && player) player.setPlaybackRate(1);
  isHolding = false;
}

clickLayer.addEventListener('pointerup', function (e) {
  e.preventDefault();
  const wasHolding = isHolding;
  stopHold();
  if (wasHolding) return;
  if (!player) return;
  isPaused = !isPaused;
  isPaused ? player.pause() : player.play();
  pauseInd.style.opacity = isPaused ? '1' : '0';
});

clickLayer.addEventListener('pointerleave', stopHold);
clickLayer.addEventListener('pointercancel', stopHold);
</script>

</body>
</html>
